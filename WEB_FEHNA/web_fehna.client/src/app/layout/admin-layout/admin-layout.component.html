<div class="admin-shell flex">
  <aside class="admin-sidebar hidden md:flex flex-column">
    <div class="admin-sidebar__brand flex align-items-center">
      <div class="admin-sidebar__mark flex align-items-center justify-content-center">
        <span class="admin-sidebar__mark-text">FHN</span>
      </div>
      <div>
        <p class="admin-sidebar__name">FEHNA Admin</p>
        <p class="admin-sidebar__email">{{ auth.currentUser()?.email }}</p>
      </div>
    </div>

    <nav class="admin-nav flex flex-column">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          class="admin-nav__link flex align-items-center"
          routerLinkActive="admin-nav__link--active"
        >
          <span [innerHTML]="link.icon"></span>
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="admin-sidebar__footer flex flex-column">
      <a class="admin-sidebar__back" routerLink="/">&larr; Volver al sitio</a>
      <button pButton rounded outlined severity="danger" size="small" (click)="logout()">Cerrar sesión</button>
    </div>
  </aside>

  <main class="admin-content">
    <router-outlet/>
  </main>
</div>
