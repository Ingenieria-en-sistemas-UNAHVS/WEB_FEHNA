<section class="page">
  <p class="eyebrow">Sala de prensa</p>
  <h1 class="page-title">Noticias &amp; resultados</h1>

  <div class="filter-row noticias-filters">
    @for (cat of categories; track cat) {
      <button
        (click)="activeCategory.set(cat)"
        [outlined]="activeCategory() !== cat"
        pButton
        rounded
        severity="primary"
        size="small"
      >
        {{ cat }}
      </button>
    }
  </div>

  <div class="news-grid">
    @for (item of news(); track item.id) {
      <article class="news-card">
        <div class="news-card__image">
          <img [alt]="item.title" [src]="item.imageUrl"/>
        </div>
        <div class="news-card__body">
          <p-tag [severity]="badgeSeverity(item.category)" [value]="item.category" styleClass="news-card__tag"/>
          <h3 class="news-card__title">{{ item.title }}</h3>
          <p class="news-card__summary line-clamp-3">{{ item.summary }}</p>
          <p class="news-card__date">{{ item.date | date: 'd MMM y' }}</p>
        </div>
      </article>
    } @empty {
      <p class="empty-note">No hay noticias en esta categoría todavía.</p>
    }
  </div>
</section>
