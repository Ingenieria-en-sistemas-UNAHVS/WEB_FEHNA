<section class="admin-page">
  <div class="admin-page__header flex align-items-center justify-content-between">
    <h1 class="admin-page__title">Eventos</h1>
    <button (click)="openCreate()" pButton rounded severity="primary" size="small">+ Nuevo evento</button>
  </div>

  <div class="table-wrap">
    <p-table [value]="events()" [rowHover]="true" styleClass="text-sm">
      <ng-template pTemplate="header">
        <tr class="table-head-row">
          <th>Fecha</th>
          <th>Nombre</th>
          <th>Lugar</th>
          <th>Disciplina</th>
          <th>Alcance</th>
          <th class="text-right">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td class="table-nowrap">{{ item.day }} {{ item.month }}</td>
          <td class="font-medium">{{ item.name }}</td>
          <td class="table-muted">{{ item.location }}</td>
          <td><p-tag severity="secondary" [value]="item.discipline" styleClass="table-tag"/></td>
          <td>
            <p-tag [severity]="item.scope === 'INTERNACIONAL' ? 'warn' : 'contrast'" [value]="item.scope"
                   styleClass="table-tag"/>
          </td>
          <td class="table-actions">
            <button (click)="openEdit(item)" pButton rounded outlined size="small">Editar</button>
            <button (click)="remove(item.id)" pButton rounded outlined severity="danger" size="small">Eliminar</button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td class="table-empty" colspan="6">No hay eventos todavía.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog
    [visible]="showForm()"
    (visibleChange)="showForm.set($event)"
    [modal]="true"
    [dismissableMask]="false"
    [header]="editingId() !== null ? 'Editar evento' : 'Nuevo evento'"
    [style]="{width: '32rem'}"
    styleClass="admin-dialog mx-4"
  >
    <form (ngSubmit)="save()" id="event-form">
      <div class="form-grid">
        <div class="field flex flex-column">
          <span class="field__label">Nombre</span>
          <input [(ngModel)]="form.name" fluid name="name" pInputText required/>
        </div>
        <div class="field flex flex-column">
          <span class="field__label">Lugar</span>
          <input [(ngModel)]="form.location" fluid name="location" pInputText required/>
        </div>
        <div class="form-row-2">
          <div class="field flex flex-column">
            <span class="field__label">Disciplina</span>
            <p-select [(ngModel)]="form.discipline" [options]="disciplineOptions" fluid name="discipline"/>
          </div>
          <div class="field flex flex-column">
            <span class="field__label">Alcance</span>
            <p-select [(ngModel)]="form.scope" [options]="scopeOptions" fluid name="scope" optionLabel="label"
                      optionValue="value"/>
          </div>
        </div>
        <div class="field flex flex-column">
          <span class="field__label">Fecha</span>
          <input [(ngModel)]="form.date" fluid name="date" pInputText required type="date"/>
        </div>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <button (click)="cancel()" pButton rounded severity="secondary" text type="button">Cancelar</button>
      <button form="event-form" pButton rounded severity="primary" type="submit">Guardar</button>
    </ng-template>
  </p-dialog>
</section>
