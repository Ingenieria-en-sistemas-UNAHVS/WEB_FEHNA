<section class="admin-page">
  <div class="admin-page__header flex align-items-center justify-content-between">
    <h1 class="admin-page__title">Noticias</h1>
    <button (click)="openCreate()" pButton rounded severity="primary" size="small">+ Nueva noticia</button>
  </div>

  <div class="table-wrap">
    <p-table [value]="news()" [rowHover]="true" styleClass="text-sm">
      <ng-template pTemplate="header">
        <tr class="table-head-row">
          <th>Título</th>
          <th>Categoría</th>
          <th>Fecha</th>
          <th>Destacada</th>
          <th class="text-right">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td class="font-medium news-admin__title truncate">{{ item.title }}</td>
          <td><p-tag severity="secondary" [value]="item.category" styleClass="table-tag"/></td>
          <td class="table-muted table-nowrap">{{ item.date }}</td>
          <td>{{ item.featured ? 'Sí' : 'No' }}</td>
          <td class="table-actions">
            <button (click)="openEdit(item)" pButton rounded outlined size="small">Editar</button>
            <button (click)="remove(item.id)" pButton rounded outlined severity="danger" size="small">Eliminar</button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td class="table-empty" colspan="5">No hay noticias todavía.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog
    [visible]="showForm()"
    (visibleChange)="showForm.set($event)"
    [modal]="true"
    [dismissableMask]="false"
    [header]="editingId() !== null ? 'Editar noticia' : 'Nueva noticia'"
    [style]="{width: '32rem'}"
    styleClass="admin-dialog mx-4"
  >
    <form (ngSubmit)="save()" id="news-form">
      <div class="form-grid">
        <div class="field flex flex-column">
          <span class="field__label">Título</span>
          <input [(ngModel)]="form.title" fluid name="title" pInputText required/>
        </div>
        <div class="field flex flex-column">
          <span class="field__label">Resumen</span>
          <textarea [(ngModel)]="form.summary" fluid name="summary" pTextarea required rows="3"></textarea>
        </div>
        <div class="field flex flex-column">
          <span class="field__label">URL de imagen</span>
          <input [(ngModel)]="form.imageUrl" fluid name="imageUrl" pInputText placeholder="https://..."/>
        </div>
        <div class="form-row-2">
          <div class="field flex flex-column">
            <span class="field__label">Categoría</span>
            <p-select [(ngModel)]="form.category" [options]="categoryOptions" fluid name="category"/>
          </div>
          <div class="field flex flex-column">
            <span class="field__label">Fecha</span>
            <input [(ngModel)]="form.date" fluid name="date" pInputText type="date"/>
          </div>
        </div>
        <label class="news-admin__checkbox flex align-items-center">
          <p-checkbox [(ngModel)]="form.featured" [binary]="true" name="featured"/>
          <span class="text-sm">Marcar como noticia destacada</span>
        </label>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <button (click)="cancel()" pButton rounded severity="secondary" text type="button">Cancelar</button>
      <button form="news-form" pButton rounded severity="primary" type="submit">Guardar</button>
    </ng-template>
  </p-dialog>
</section>
